[build]
builder = "dockerfile"

[deploy]
preDeployCommand = "python manage.py migrate --noinput"
startCommand = "/bin/sh -c 'gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level debug'"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
