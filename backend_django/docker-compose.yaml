version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: abcdh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-abcdh_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-abcdh_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abcdh_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abcdh_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    networks:
      - abcdh_network

volumes:
  postgres_data:

networks:
  abcdh_network:
    driver: bridge