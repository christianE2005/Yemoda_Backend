[pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
python_files = tests/test_*.py
python_classes = Test
python_functions = test_
; --no-migrations: build the test schema straight from the models. The migration files use
; Postgres-only SQL (ADD COLUMN IF NOT EXISTS, RunSQL) that the SQLite test database cannot
; execute, so running migrations made the whole suite error out at setup.
addopts = --no-migrations
